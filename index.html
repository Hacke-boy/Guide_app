<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lafond Guilde</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; text-align: center; }
        .login-box { margin-top: 100px; padding: 20px; }
        h1 { color: #f00; font-size: 24px; }
        input { width: 80%; padding: 15px; margin: 20px 0; border: 1px solid #f00; background: #111; color: #fff; border-radius: 5px; font-size: 18px; }
        button { width: 85%; padding: 15px; background: #f00; color: #fff; border: none; border-radius: 5px; font-weight: bold; font-size: 16px; }
        #app { display: none; padding: 20px; }
        .msg-box { border: 1px solid #333; height: 300px; overflow-y: auto; margin-bottom: 10px; text-align: left; padding: 10px; }
    </style>
</head>
<body>

    <div id="login-screen" class="login-box">
        <h1>LAFOND GUILDE</h1>
        <input type="number" id="id-field" placeholder="ID FREE FIRE">
        <button onclick="entrer()">SE CONNECTER</button>
    </div>

    <div id="app">
        <h2 style="color:#f00">QG DE LA GUILDE</h2>
        <div id="chat" class="msg-box"></div>
        <input type="text" id="m-text" placeholder="Message..." style="width:70%">
        <button onclick="envoyer()" style="width:20%">OK</button>
    </div>

    <script>
        // ON UTILISE DES VARIABLES SIMPLES
        var listeIds = ["6850649058", "12345" ,"7228890030"];
        var passAdmin = "LAFOND_BOSS";

        function entrer() {
            var valeur = document.getElementById('id-field').value;
            
            if (valeur === "6850649058" || valeur === "12345") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app').style.display = 'block';
            } 
            else if (valeur === passAdmin) {
                alert("Mode Admin activé !");
                // Logique admin simplifiée ici plus tard
            }
            else {
                alert("ID " + valeur + " non reconnu !");
            }
        }

        function envoyer() {
            var t = document.getElementById('m-text');
            if(t.value) {
                var c = document.getElementById('chat');
                c.innerHTML += "<div><b>Moi:</b> " + t.value + "</div>";
                t.value = "";
                c.scrollTop = c.scrollHeight;
            }
        }
    </script>
</body>
</html>
