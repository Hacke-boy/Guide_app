<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guilde Lafond</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #1a1a1a; padding: 25px; border: 2px solid #f00; border-radius: 15px; text-align: center; width: 85%; }
        h1 { color: #f00; margin-bottom: 10px; }
        input { width: 90%; padding: 12px; margin: 15px 0; border-radius: 5px; border: 1px solid #333; background: #000; color: #fff; }
        button { width: 100%; padding: 12px; background: #f00; color: #fff; border: none; border-radius: 5px; font-weight: bold; }
        #chat { display: none; width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <div id="login" class="card">
        <h1>GUILDE PRIVÉE</h1>
        <input type="text" id="pid" placeholder="Entre ton ID Free Fire">
        <button onclick="check()">ENTRER</button>
    </div>

    <div id="chat">
        <div style="padding: 20px; border-bottom: 1px solid #f00; color:#f00; font-weight:bold;">CHAT DE GUILDE</div>
        <div id="msgs" style="flex:1; padding: 20px; overflow-y:auto;"></div>
        <div style="padding: 10px; display:flex;">
            <input type="text" id="min" placeholder="Message..." style="margin:0;">
            <button onclick="send()" style="width:60px;">OK</button>
        </div>
    </div>

    <script>
    // --- CONFIGURATION ---
    // Remplace ces IDs par les vrais IDs de tes joueurs
    let autorizedIDs = ["6850649058", "99999", "77777"]; 
    const ADMIN_PASSWORD = "LAFOND_BOSS"; // Ton mot de passe pour gérer la liste

    // --- LOGIQUE DE CONNEXION ---
    function checkID() {
        const id = document.getElementById('pid').value;
        
        // Si tu tapes le mot de passe admin à la place de l'ID
        if (id === ADMIN_PASSWORD) {
            showAdmin();
            return;
        }

        if (autorizedIDs.includes(id)) {
            document.getElementById('login').style.display = 'none';
            document.getElementById('chat').style.display = 'block';
            document.getElementById('msgs').innerHTML += `<div style="color:gray; font-size:12px;">Bienvenue, soldat ${id} !</div>`;
        } else {
            alert("⚠️ ID INCONNU ! Contacte le chef de guilde.");
        }
    }

    // --- LOGIQUE ADMIN ---
    function showAdmin() {
        document.getElementById('login').innerHTML = `
            <h1 style="color:#fff">ESPACE CHEF</h1>
            <div id="id-list" style="text-align:left; margin-bottom:15px; max-height:150px; overflow-y:auto; border:1px solid #333; padding:10px;">
                ${autorizedIDs.map(i => `<div style="display:flex; justify-content:space-between;"><span>${i}</span> <button onclick="removeID('${i}')" style="width:30px; padding:2px; margin-bottom:5px;">X</button></div>`).join('')}
            </div>
            <input type="text" id="new-id" placeholder="Nouvel ID Joueur">
            <button onclick="addID()" style="margin-bottom:10px;">AJOUTER JOUEUR</button>
            <button onclick="location.reload()" style="background:#333;">RETOUR</button>
        `;
    }

    function addID() {
        const newID = document.getElementById('new-id').value;
        if(newID && !autorizedIDs.includes(newID)) {
            autorizedIDs.push(newID);
            showAdmin();
            alert("Joueur ajouté !");
        }
    }

    function removeID(id) {
        autorizedIDs = autorizedIDs.filter(i => i !== id);
        showAdmin();
    }

    // --- LOGIQUE CHAT ---
    function send() {
        const i = document.getElementById('min');
        if(i.value) {
            const d = document.createElement('div');
            d.style.marginBottom = "10px";
            d.innerHTML = `<span style="color:#f00; font-weight:bold;">Soldat:</span> ${i.value}`;
            document.getElementById('msgs').appendChild(d);
            i.value = "";
            document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
        }
    }
                </script>
    
</body>
</html>
