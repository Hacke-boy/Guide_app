<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guilde Lafond - E-sport</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* DESIGN GLOBAL - NOIR ET ROUGE */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ECRAN DE CONNEXION */
        #login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .card {
            background-color: #111;
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #ff0000;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
            width: 85%;
            max-width: 400px;
        }

        h1 { color: #ff0000; text-transform: uppercase; margin-bottom: 20px; letter-spacing: 2px; }

        input {
            width: 90%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 5px;
            border: 1px solid #333;
            background: #000;
            color: #fff;
            font-size: 16px;
            text-align: center;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #ff0000;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
        }

        /* ECRAN CHAT & ADMIN */
        #main-app { display: none; flex-direction: column; height: 100vh; }
        
        .header {
            background: #111;
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #ff0000;
            color: #ff0000;
            font-weight: bold;
            font-size: 1.2rem;
        }

        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg { background: #222; padding: 10px; border-radius: 8px; border-left: 3px solid #ff0000; }
        .msg b { color: #ff0000; display: block; font-size: 0.8rem; }

        .input-area {
            display: flex;
            padding: 10px;
            background: #111;
            border-top: 1px solid #333;
        }

        .input-area input { margin: 0; border-radius: 5px 0 0 5px; text-align: left; }
        .input-area button { width: 70px; border-radius: 0 5px 5px 0; }

        /* ESPACE ADMIN */
        #admin-panel { display: none; padding: 20px; }
        .admin-item { 
            display: flex; 
            justify-content: space-between; 
            padding: 10px; 
            border-bottom: 1px solid #333; 
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="card">
            <h1>LAFOND GUILDE</h1>
            <input type="text" id="player-id" placeholder="ID FREE FIRE">
            <button onclick="validerAcces()">SE CONNECTER</button>
        </div>
    </div>

    <div id="main-app">
        <div class="header" id="app-title">QG DE LA GUILDE</div>
        
        <div id="chat-messages">
            <div class="msg"><b>Système</b>Bienvenue dans le salon privé de la guilde.</div>
        </div>

        <div id="admin-panel">
            <h3 style="color:#ff0000">Gérer les IDs</h3>
            <div id="list-ids"></div>
            <input type="text" id="new-id-input" placeholder="Ajouter un ID...">
            <button onclick="ajouterID()">AJOUTER</button>
            <br><br>
            <button onclick="fermerAdmin()" style="background:#333">RETOUR CHAT</button>
        </div>

        <div class="input-area" id="footer-chat">
            <input type="text" id="msg-input" placeholder="Écris un message...">
            <button onclick="envoyerMessage()">OK</button>
        </div>
    </div>

    <script>
        // --- DONNÉES ---
        let autorizedIDs = ["6850649058", "12345"]; // Ton ID est ici
        const ADMIN_PASS = "LAFOND_BOSS"; // Tape ça dans ID pour devenir admin

        // --- FONCTIONS ---
        function validerAcces() {
            const input = document.getElementById('player-id').value.trim();

            if (input === ADMIN_PASS) {
                ouvrirAdmin();
                return;
            }

            if (autorizedIDs.includes(input)) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                // On garde l'ID en mémoire pour le chat
                window.currentUser = input;
            } else {
                alert("❌ ID INCONNU !");
            }
        }

        function envoyerMessage() {
            const input = document.getElementById('msg-input');
            const zone = document.getElementById('chat-messages');
            
            if (input.value.trim() !== "") {
                const div = document.createElement('div');
                div.className = "msg";
                div.innerHTML = `<b>Soldat ${window.currentUser}:</b> ${input.value}`;
                zone.appendChild(div);
                input.value = "";
                zone.scrollTop = zone.scrollHeight;
            }
        }

        // --- LOGIQUE ADMIN ---
        function ouvrirAdmin() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            document.getElementById('chat-messages').style.display = 'none';
            document.getElementById('footer-chat').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('app-title').innerText = "PANNEAU CHEF";
            rafraichirListeAdmin();
        }

        function fermerAdmin() {
            location.reload(); // Simple pour revenir au début
        }

        function rafraichirListeAdmin() {
            const liste = document.getElementById('list-ids');
            liste.innerHTML = autorizedIDs.map(id => `
                <div class="admin-item">
                    <span>${id}</span>
                    <button onclick="supprimerID('${id}')" style="width:40px; padding:5px; background:#333;">X</button>
                </div>
            `).join('');
        }

        function ajouterID() {
            const id = document.getElementById('new-id-input').value.trim();
            if(id && !autorizedIDs.includes(id)) {
                autorizedIDs.push(id);
                rafraichirListeAdmin();
                document.getElementById('new-id-input').value = "";
            }
        }

        function supprimerID(id) {
            autorizedIDs = autorizedIDs.filter(i => i !== id);
            rafraichirListeAdmin();
        }
    </script>
</body>
</html>
